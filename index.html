<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#11151c" />
    <meta
      name="description"
      content="Peshka bar, cafe, and chess club interactive architectural walkthrough"
    />
    <title>Peshka Walkthrough</title>
  </head>
  <body>
    <canvas id="app" aria-label="Interactive 3D walkthrough"></canvas>
    <div id="look-zone" aria-hidden="true"></div>

    <header id="hud">
      <div class="brand">
        <span class="brand-mark">P</span>
        <div>
          <div class="title">Peshka</div>
          <div class="eyebrow">Bar · Cafe · Chess Club</div>
        </div>
      </div>
      <div id="status" role="status">Preparing walkthrough...</div>
      <div id="loading-progress" class="progress" aria-label="Model loading progress">
        <span></span>
      </div>
    </header>

    <nav id="presentation-tools" aria-label="Presentation controls">
      <button id="mode-button" type="button" title="Toggle day/evening (L)">
        <span class="tool-icon">◐</span>
        <span id="mode-label">Evening</span>
      </button>
      <button id="screenshot-button" type="button" title="Save screenshot">
        <span class="tool-icon">□</span>
        <span>Capture</span>
      </button>
      <button id="fullscreen-button" type="button" title="Toggle fullscreen">
        <span class="tool-icon">↗</span>
        <span>Full</span>
      </button>
      <button id="model-button" type="button" title="Load an updated GLB model">
        <span class="tool-icon">↑</span>
        <span>Model</span>
      </button>
      <button id="settings-button" type="button" title="Presentation settings">
        <span class="tool-icon">···</span>
        <span>Adjust</span>
      </button>
      <button id="share-button" type="button" title="Hide interface (H)">
        <span class="tool-icon">○</span>
        <span>Share</span>
      </button>
    </nav>
    <input id="model-input" type="file" accept=".glb,model/gltf-binary" hidden />

    <aside id="settings" hidden>
      <div class="settings-title">Presentation tuning</div>
      <label>
        <span>Exposure</span>
        <input id="exposure-control" type="range" min="0.7" max="1.5" step="0.01" value="1" />
      </label>
      <label>
        <span>Bloom</span>
        <input id="bloom-control" type="range" min="0" max="0.45" step="0.01" value="0.16" />
      </label>
      <label class="toggle">
        <span>Contact shading</span>
        <input id="ssao-control" type="checkbox" checked />
      </label>
    </aside>

    <div id="interaction-prompt" hidden>F · Open door</div>
    <div id="model-drop-overlay" hidden>
      <div>
        <strong>Drop updated GLB</strong>
        <span>The current model will be replaced after the new file loads.</span>
      </div>
    </div>
    <div id="crosshair" aria-hidden="true"></div>
    <div id="desktop-hint">WASD walk/stairs · Drag/Arrows look · RMB zoom · E/Q eye height · F interact · L light</div>

    <div id="mobile-controls" aria-label="Touch controls">
      <div id="joystick" aria-label="Walk control"><span id="joystick-knob"></span></div>
      <button id="door-button" type="button" hidden>Door</button>
      <div class="look-hint">Drag to look</div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
